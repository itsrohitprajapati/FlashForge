<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Homepage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="fade-in">
        <h1>Welcome to Our Store!</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero fade-in delay-1">
            <div class="hero-content">
                <h2>Discover Amazing Products</h2>
                <p>High-quality items for every need.</p>
                <button class="shop-now-btn">Shop Now</button>
            </div>
        </section>

        <section class="products">
            <h2 class="fade-in delay-2">Featured Products</h2>
            <div class="product-grid">
                <div class="product-card fade-in delay-3">
                    <img src="https://via.placeholder.com/200" alt="Product 1">
                    <h3>Product Name 1</h3>
                    <p>$29.99</p>
                    <button>Add to Cart</button>
                </div>
                <div class="product-card fade-in delay-4">
                    <img src="https://via.placeholder.com/200" alt="Product 2">
                    <h3>Product Name 2</h3>
                    <p>$49.99</p>
                    <button>Add to Cart</button>
                </div>
                <div class="product-card fade-in delay-5">
                    <img src="https://via.placeholder.com/200" alt="Product 3">
                    <h3>Product Name 3</h3>
                    <p>$19.99</p>
                    <button>Add to Cart</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="fade-in delay-6">
        <p>&copy; 2023 Our Store. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
